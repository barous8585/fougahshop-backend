services:
  - type: web
    name: proxyshop-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proxyshop-db
          property: connectionString
      - key: APP_URL
        value: https://proxyshop-api.onrender.com
      - key: CINETPAY_SITE_ID
        sync: false
      - key: CINETPAY_API_KEY
        sync: false

databases:
  - name: proxyshop-db
    plan: free
